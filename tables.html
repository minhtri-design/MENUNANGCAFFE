<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nắng Café — Bàn &amp; Hoá đơn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=20260717">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="sun-mark">☀️</span>
      <div>
        <div class="brand-text">Nắng Café</div>
        <div class="brand-sub">Food and Drink</div>
      </div>
    </div>
    <nav class="nav-tabs">
      <a href="index.html">Gọi món</a>
      <a href="tables.html" class="active">Bàn &amp; Hoá đơn</a>
      <a href="settings.html">Cài đặt</a>
    </nav>
    <div style="width:110px"></div>
  </div>
</div>

<div class="page">
  <div class="tables-header">
    <h1>Các bàn đang phục vụ</h1>
    <div class="summary-strip">
      <div>Số bàn: <b id="sumTables">0</b></div>
      <div>Tổng khách: <b id="sumGuests">0</b></div>
      <div>Doanh thu: <b id="sumRevenue">0k</b></div>
    </div>
  </div>

  <div class="export-bar">
    <div class="export-bar-label">📋 Chứng từ doanh thu</div>
    <input type="date" id="exportDate" class="export-date-input">
    <button class="btn-secondary" id="exportDayBtn">Xuất Excel ngày này</button>
    <button class="btn-secondary" id="exportAllBtn">Xuất Excel toàn bộ</button>
  </div>

  <div id="tablesGrid" class="tables-grid"></div>

  <div class="empty-tables" id="emptyState" style="display:none">
    <div class="et-icon">🪑</div>
    <h3>Chưa có bàn nào gọi món</h3>
    <div>Qua trang <a href="index.html" style="text-decoration:underline">Gọi món</a> để bắt đầu order</div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <h2>🧾 Lịch sử hoá đơn đã thanh toán</h2>
      <button class="btn-danger-outline" id="clearHistoryBtn">Xoá toàn bộ lịch sử</button>
    </div>
    <div id="historyList"></div>
    <div class="tc-empty" id="historyEmpty" style="display:none">Chưa có hoá đơn nào được lưu lại</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="menu-data.js?v=20260717"></script>
<script src="store.js?v=20260717"></script>
<script>
let ALL_ITEMS = Store.getMenu().flatMap(cat => cat.items.map(it => ({...it, category: cat.category})));

function render(){
  const tables = Store.getTables();
  const grid = document.getElementById('tablesGrid');
  const activeNames = Object.keys(tables).filter(name => Object.keys(tables[name].items).length > 0);

  if(activeNames.length === 0){
    grid.innerHTML = "";
    document.getElementById('emptyState').style.display = 'block';
  } else {
    document.getElementById('emptyState').style.display = 'none';
    grid.innerHTML = activeNames.sort().map(name => renderTableCard(name, tables[name])).join('');
  }

  // Summary
  let totalGuests = 0, totalRevenue = 0;
  activeNames.forEach(name=>{
    totalGuests += tables[name].guests || 0;
    totalRevenue += Store.tableTotal(tables[name]);
  });
  document.getElementById('sumTables').textContent = activeNames.length;
  document.getElementById('sumGuests').textContent = totalGuests;
  document.getElementById('sumRevenue').textContent = Store.formatPrice(totalRevenue);
}

function renderTableCard(name, table){
  const items = Object.entries(table.items);
  const total = Store.tableTotal(table);
  const itemsHtml = items.length ? items.map(([itemName, it])=>`
    <div class="tc-line">
      <div class="tc-line-name">${itemName}
        <div class="tc-line-price">
          <button class="price-edit-btn" data-action="edit-price" data-table="${encodeURIComponent(name)}" data-item="${encodeURIComponent(itemName)}" title="Sửa giá món này cho đơn này">
            ✏️ ${it.price}k${it.unit?` / ${it.unit}`:''}
          </button>
        </div>
      </div>
      <div class="tc-qty-control">
        <button data-action="dec" data-table="${encodeURIComponent(name)}" data-item="${encodeURIComponent(itemName)}">−</button>
        <span class="tc-qty-num">${it.qty}</span>
        <button data-action="inc" data-table="${encodeURIComponent(name)}" data-item="${encodeURIComponent(itemName)}">+</button>
      </div>
    </div>
  `).join('') : `<div class="tc-empty">Chưa có món</div>`;

  const options = ALL_ITEMS.map(it => `<option value="${encodeURIComponent(it.name)}" data-price="${it.price}" data-unit="${it.unit||''}">${it.name} — ${it.price}k</option>`).join('');

  return `
  <div class="table-card" data-table="${encodeURIComponent(name)}">
    <div class="tc-head">
      <div class="tc-name">${name}</div>
      <div class="tc-guests">
        👤 <span class="tc-guests-num">${table.guests}</span>
        <button data-action="guest-dec" data-table="${encodeURIComponent(name)}">−</button>
        <button data-action="guest-inc" data-table="${encodeURIComponent(name)}">+</button>
      </div>
    </div>
    <div class="tc-body">${itemsHtml}</div>
    <div class="add-item-row">
      <select class="add-item-select" data-table="${encodeURIComponent(name)}">
        <option value="">+ Thêm món khác...</option>
        ${options}
      </select>
    </div>
    <div class="tc-footer">
      <div class="tc-total">${Store.formatPrice(total)}</div>
      <div class="tc-actions">
        <button class="tc-icon-btn" data-action="print-bill" data-table="${encodeURIComponent(name)}">🖨️ In hoá đơn</button>
        <button class="tc-icon-btn success" data-action="pay-cash" data-table="${encodeURIComponent(name)}">💵 TT Tiền mặt</button>
        <button class="tc-icon-btn success" data-action="pay-transfer" data-table="${encodeURIComponent(name)}">🏦 TT Chuyển khoản</button>
      </div>
    </div>
  </div>`;
}

function updateItem(tableName, itemName, delta){
  const tables = Store.getTables();
  const t = tables[tableName];
  if(!t || !t.items[itemName]) return;
  t.items[itemName].qty += delta;
  if(t.items[itemName].qty <= 0) delete t.items[itemName];
  Store.saveTables(tables);
  render();
}

function editItemPrice(tableName, itemName){
  const tables = Store.getTables();
  const t = tables[tableName];
  if(!t || !t.items[itemName]) return;
  const current = t.items[itemName].price;
  const input = prompt(`Sửa giá "${itemName}" cho đơn này (đơn vị: nghìn đồng).\nGiá hiện tại: ${current}k\nNhập giá mới (chỉ áp dụng cho đơn của bàn này, không đổi giá gốc trong menu):`, current);
  if(input === null) return; // bấm Huỷ
  const newPrice = Number(input.replace(',', '.').trim());
  if(isNaN(newPrice) || newPrice < 0){
    showToast("Giá không hợp lệ");
    return;
  }
  t.items[itemName].price = newPrice;
  Store.saveTables(tables);
  render();
  showToast(`Đã cập nhật giá "${itemName}" → ${newPrice}k`);
}

function updateGuests(tableName, delta){
  const tables = Store.getTables();
  const t = tables[tableName];
  if(!t) return;
  t.guests = Math.max(1, (t.guests||1) + delta);
  Store.saveTables(tables);
  render();
}

async function addItemToTable(tableName, itemName, price, unit){
  const tables = Store.getTables();
  if(!tables[tableName]) tables[tableName] = { guests:1, items:{} };
  const t = tables[tableName];
  if(t.items[itemName]) t.items[itemName].qty += 1;
  else t.items[itemName] = { qty:1, price, unit: unit||null };
  Store.saveTables(tables);
  render();

  const settings = Store.getSettings();
  if(settings.telegramEnabled){
    const newItems = { [itemName]: { qty:1, price, unit: unit||null } };
    const result = await Store.sendTelegramOrder(tableName, newItems, tables[tableName]);
    if(!result.ok) showToast("Gửi Telegram thất bại — kiểm tra ở trang Cài đặt");
  }
}

async function printBill(tableName){
  const tables = Store.getTables();
  const t = tables[tableName];
  if(!t || Object.keys(t.items).length === 0){
    showToast("Bàn này chưa có món để in");
    return;
  }
  if(navigator.bluetooth){
    // Trình duyệt hỗ trợ Web Bluetooth (Bluefy trên iPhone, Chrome/Edge trên Android & máy tính)
    showToast("Đang tìm máy in — chọn tên máy in trong danh sách hiện ra...");
    try{
      await Store.printReceiptBLE(tableName, t);
      showToast("Đã gửi lệnh in ✓");
    }catch(err){
      if(err && err.name === "NotFoundError"){
        showToast("Bạn chưa chọn máy in trong danh sách");
      } else {
        showToast("In thất bại: " + (err && err.message ? err.message : "lỗi không rõ"));
      }
    }
  } else {
    // Không có Web Bluetooth (ví dụ Safari trên iPhone) → dùng cách cũ qua app RawBT (Android)
    Store.printReceipt(tableName, t);
  }
}

function payTable(tableName, method){
  const tables = Store.getTables();
  const t = tables[tableName];
  if(!t || Object.keys(t.items).length === 0){
    showToast("Bàn này chưa có món nào");
    return;
  }
  const methodLabel = method === 'cash' ? 'tiền mặt' : 'chuyển khoản';
  if(!confirm(`Xác nhận ${tableName} đã thanh toán bằng ${methodLabel}? Hoá đơn sẽ được lưu lại, bàn trống để đón khách mới.`)) return;

  Store.logCompletedOrder(tableName, t, method);
  t.items = {};
  t.guests = 1; // reset để sẵn sàng cho nhóm khách tiếp theo
  Store.saveTables(tables);
  render();
  renderHistory();
  showToast(`${tableName} đã thanh toán (${methodLabel}) ✓ — hoá đơn đã lưu, sẵn sàng đón khách mới`);
}

document.getElementById('tablesGrid').addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  const action = btn.dataset.action;
  const tableName = decodeURIComponent(btn.dataset.table);

  if(action === 'inc') updateItem(tableName, decodeURIComponent(btn.dataset.item), 1);
  else if(action === 'dec') updateItem(tableName, decodeURIComponent(btn.dataset.item), -1);
  else if(action === 'edit-price') editItemPrice(tableName, decodeURIComponent(btn.dataset.item));
  else if(action === 'guest-inc') updateGuests(tableName, 1);
  else if(action === 'guest-dec') updateGuests(tableName, -1);
  else if(action === 'pay-cash') payTable(tableName, 'cash');
  else if(action === 'pay-transfer') payTable(tableName, 'transfer');
  else if(action === 'print-bill') printBill(tableName);
});

document.getElementById('tablesGrid').addEventListener('change', (e)=>{
  const select = e.target.closest('.add-item-select');
  if(!select || !select.value) return;
  const tableName = decodeURIComponent(select.dataset.table);
  const itemName = decodeURIComponent(select.value);
  const opt = select.selectedOptions[0];
  const price = parseInt(opt.dataset.price, 10);
  const unit = opt.dataset.unit;
  addItemToTable(tableName, itemName, price, unit);
  select.value = "";
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ---------- LỊCH SỬ HOÁ ĐƠN (đã thanh toán) ----------
function renderHistory(){
  const log = Store.getOrderLog().slice().sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time));
  const wrap = document.getElementById('historyList');

  if(log.length === 0){
    wrap.innerHTML = "";
    document.getElementById('historyEmpty').style.display = 'block';
    return;
  }
  document.getElementById('historyEmpty').style.display = 'none';

  wrap.innerHTML = log.map(r => {
    const itemsHtml = r.items.map(it => `
      <div class="tc-line">
        <div class="tc-line-name">${it.name}${it.unit?`<div class="tc-line-price">${it.price}k / ${it.unit}</div>`:`<div class="tc-line-price">${it.price}k</div>`}</div>
        <div>${it.qty} × ${it.price}k = <b>${it.lineTotal}k</b></div>
      </div>
    `).join('');

    const payBadge = r.paymentMethod === 'transfer'
      ? `<span class="pay-badge pay-transfer">🏦 CK</span>`
      : `<span class="pay-badge pay-cash">💵 Tiền mặt</span>`;

    return `
    <div class="history-card">
      <div class="hc-head" data-action="toggle" data-id="${r.id}">
        <div>
          <div class="hc-table">${r.table} ${payBadge}</div>
          <div class="hc-time">${r.date} · ${r.time} · ${r.guests} khách</div>
        </div>
        <div class="hc-total">${r.total.toLocaleString('vi-VN')}k</div>
      </div>
      <div class="hc-body" id="hc-body-${r.id}">
        ${itemsHtml}
        <div class="hc-actions">
          <button class="tc-icon-btn" data-action="reprint" data-id="${r.id}">🖨️ In lại</button>
          <button class="tc-icon-btn danger" data-action="delete-record" data-id="${r.id}">Xoá bản ghi</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('historyList').addEventListener('click', async (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if(action === 'toggle'){
    const body = document.getElementById(`hc-body-${id}`);
    body.classList.toggle('open');
  } else if(action === 'reprint'){
    const record = Store.getOrderLog().find(r => r.id === id);
    if(!record) return;
    if(navigator.bluetooth){
      showToast("Đang tìm máy in — chọn tên máy in trong danh sách hiện ra...");
      try{
        await Store.printReceiptFromRecordBLE(record);
        showToast("Đã gửi lệnh in ✓");
      }catch(err){
        showToast("In thất bại: " + (err && err.message ? err.message : "lỗi không rõ"));
      }
    } else {
      Store.printReceiptFromRecord(record);
    }
  } else if(action === 'delete-record'){
    if(!confirm("Xoá bản ghi hoá đơn này khỏi lịch sử? Không thể hoàn tác.")) return;
    Store.deleteOrderRecord(id);
    renderHistory();
    showToast("Đã xoá bản ghi");
  }
});

document.getElementById('clearHistoryBtn').addEventListener('click', ()=>{
  if(!confirm("Xoá TOÀN BỘ lịch sử hoá đơn? Không thể hoàn tác — nên xuất Excel lưu lại trước khi xoá.")) return;
  Store.clearOrderLog();
  renderHistory();
  showToast("Đã xoá toàn bộ lịch sử");
});

// ---------- Xuất Excel (chứng từ doanh thu) ----------
function paymentMethodLabel(m){
  return m === 'transfer' ? 'Chuyển khoản' : 'Tiền mặt';
}

function buildDetailRows(records){
  const rows = [];
  records.forEach(r=>{
    r.items.forEach(it=>{
      rows.push({
        "Ngày": r.date,
        "Giờ": r.time,
        "Bàn": r.table,
        "Số khách": r.guests,
        "Hình thức TT": paymentMethodLabel(r.paymentMethod),
        "Tên món": it.name,
        "Đơn vị": it.unit || "",
        "Số lượng": it.qty,
        "Đơn giá (VNĐ)": it.price * 1000,
        "Thành tiền (VNĐ)": it.lineTotal * 1000
      });
    });
  });
  return rows;
}

function buildSummaryRows(records){
  const byDate = {};
  records.forEach(r=>{
    if(!byDate[r.date]) byDate[r.date] = { date:r.date, orders:0, revenue:0, cashOrders:0, cashRevenue:0, transferOrders:0, transferRevenue:0 };
    const d = byDate[r.date];
    d.orders += 1;
    d.revenue += r.total;
    if(r.paymentMethod === 'transfer'){
      d.transferOrders += 1;
      d.transferRevenue += r.total;
    } else {
      d.cashOrders += 1;
      d.cashRevenue += r.total;
    }
  });
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>({
    "Ngày": d.date,
    "Số đơn (bàn) đã chốt": d.orders,
    "Tổng doanh thu (VNĐ)": d.revenue * 1000,
    "Số đơn tiền mặt": d.cashOrders,
    "Doanh thu tiền mặt (VNĐ)": d.cashRevenue * 1000,
    "Số đơn chuyển khoản": d.transferOrders,
    "Doanh thu chuyển khoản (VNĐ)": d.transferRevenue * 1000
  }));
}

function exportToExcel(records, filename){
  if(!records.length){
    showToast("Không có dữ liệu để xuất");
    return;
  }
  const wb = XLSX.utils.book_new();
  const wsDetail = XLSX.utils.json_to_sheet(buildDetailRows(records));
  const wsSummary = XLSX.utils.json_to_sheet(buildSummaryRows(records));
  XLSX.utils.book_append_sheet(wb, wsSummary, "Tổng hợp theo ngày");
  XLSX.utils.book_append_sheet(wb, wsDetail, "Chi tiết đơn hàng");
  XLSX.writeFile(wb, filename);
}

document.getElementById('exportDayBtn').addEventListener('click', ()=>{
  const dateStr = document.getElementById('exportDate').value || Store.todayStr();
  const records = Store.getOrderLogByDate(dateStr);
  exportToExcel(records, `Doanh-thu-${dateStr}.xlsx`);
});

document.getElementById('exportAllBtn').addEventListener('click', ()=>{
  const records = Store.getOrderLog();
  exportToExcel(records, `Doanh-thu-tat-ca.xlsx`);
});

document.getElementById('exportDate').value = Store.todayStr();

Store.initSync(()=>{
  ALL_ITEMS = Store.getMenu().flatMap(cat => cat.items.map(it => ({...it, category: cat.category})));
  render();
  renderHistory();
});
// Refresh khi quay lại tab (nếu mở 2 tab cùng lúc)
window.addEventListener('storage', ()=>{ render(); renderHistory(); });
</script>
<script id="no-zoom-lock">
// Chặn zoom bằng Ctrl + lăn chuột / Ctrl + phím + - (chỉ desktop, không ảnh hưởng cảm ứng)
document.addEventListener('wheel', function(e){
  if(e.ctrlKey) e.preventDefault();
}, { passive:false });

document.addEventListener('keydown', function(e){
  if(e.ctrlKey && ['+','-','=','0'].includes(e.key)) e.preventDefault();
});
</script>
</body>
</html>
